name: Deploy Noha Player to GitHub Pages

on:
  push:
    branches:
      - main
      - feat-scaffold-noha-player-web-pwa
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: |
          npm run build -w apps/noha-player-web
          cp apps/noha-player-web/dist/index.html apps/noha-player-web/dist/404.html
        env:
          VITE_BASE_PATH: /noha-player/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/noha-player-web/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
